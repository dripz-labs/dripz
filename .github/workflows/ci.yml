name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.toml') }}
      - name: fmt
        run: cargo fmt --all
      - name: build
        run: cargo build --workspace --all-targets
      - name: test
        run: cargo test --workspace --all-targets

  typescript:
    name: typescript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sdk-demo/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - run: npm test
