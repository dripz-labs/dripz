name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: build release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: build cli
        run: cargo build --release -p dripz-cli-demo
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dripz-cli-${{ github.ref_name }}-linux
          path: target/release/dripz

  publish-release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./artifacts/**/*
